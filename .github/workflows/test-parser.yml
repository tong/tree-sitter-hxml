name: Test tree-sitter-hxml parser

on:
  push:
    branches: [main, dev]
    paths:
      - bindings/**
      - examples/**
      - queries/**
      - src/**
      - test/**
      - .github/workflows/**
      - binding.gyp
      - grammar.js
  pull_request:
    paths:
      - bindings/**
      - examples/**
      - queries/**
      - src/**
      - test/**
      - .github/workflows/**
      - binding.gyp
      - grammar.js

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true

jobs:
  test-parser:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup node.js
        uses: actions/setup-node@v6
        with:
          cache: "npm"
      - name: Install dependencies
        run: npm ci
        env:
          CXXFLAGS: "-std=c++20"
      - name: Generate parser
        run: npx tree-sitter generate
      - name: Run grammar tests
        run: npx tree-sitter test
      - name: Test example files with comprehensive script
        run: npm run test-examples

  build-bindings:
    runs-on: ubuntu-latest
    needs: test-parser
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: "npm"
      - name: Install dependencies
        run: npm ci
        env:
          CXXFLAGS: "-std=c++20"
      - name: Generate parser
        run: npx tree-sitter generate
      - name: Build C library
        run: make
      - name: Test C compilation
        run: |
          if [ -f "libtree-sitter-hxml.a" ]; then
            echo "✅ Static library built successfully"
          else
            echo "❌ Static library build failed"
            exit 1
          fi

          if [ -f "libtree-sitter-hxml.so" ]; then
            echo "✅ Shared library built successfully"
          else
            echo "❌ Shared library build failed"  
            exit 1
          fi
      - name: Upload parser artifacts
        uses: actions/upload-artifact@v7
        with:
          name: parser-binaries
          path: |
            libtree-sitter-hxml.a
            libtree-sitter-hxml.so
            src/parser.c
